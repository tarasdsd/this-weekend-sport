<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Conditional Sports Tilt Game</title>
    
    <!-- MediaPipe and Google Fonts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.10.0/drawing_utils.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --soft-blue: #e3f2fd;
            --deep-blue: #1976d2;
            --correct-green: #4caf50;
            --wrong-red: #f44336;
            --text-color: #333;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--soft-blue);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            text-align: center;
        }

        /* UI Elements */
        #header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            position: absolute;
            top: -60px;
        }

        #timer-bar {
            width: 100%;
            height: 10px;
            background: #ccc;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            background: var(--deep-blue);
            width: 100%;
            transition: width 1s linear;
        }

        /* Webcam Area */
        #video-wrapper {
            position: relative;
            width: 400px;
            height: 300px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background: #000;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirrored View */
        }

        /* Question and Options */
        #question-text {
            font-size: 2rem;
            margin-bottom: 30px;
            min-height: 2.5em;
        }

        .options-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .option-box {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 6px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .arrow {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #ddd;
        }

        .selected {
            border-color: var(--correct-green);
            background-color: #f0fff0;
            transform: scale(1.05);
        }

        .selected .arrow {
            color: var(--correct-green);
        }

        /* Start and End Screens */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--soft-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        button {
            padding: 20px 50px;
            font-size: 1.5rem;
            background: var(--deep-blue);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.1); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>If Conditional Sports Tilt</h1>
        <p>Tilt your head Left or Right to choose the logical answer!</p>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="header">
            <div id="score">Score: 0</div>
            <div id="timer-text">Time: 7s</div>
        </div>
        
        <div id="timer-bar"><div id="timer-fill"></div></div>

        <div id="video-wrapper">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <div id="question-text">Loading question...</div>

        <div class="options-container">
            <div id="option-left" class="option-box">
                <div class="arrow">⬅</div>
                <div class="text">Option A</div>
            </div>
            <div id="option-right" class="option-box">
                <div class="arrow">➡</div>
                <div class="text">Option B</div>
            </div>
        </div>
    </div>

    <!-- Audio elements -->
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0";

        const questions = [
            { q: "If it rains tomorrow...", l: "...we will play indoor basketball.", r: "...we will go surfing in the storm.", rain: true, ans: 'l' },
            { q: "If the wind is very strong...", l: "...we'll fly a kite safely.", r: "...we won't go sailing.", ans: 'r' },
            { q: "If it is sunny on Saturday...", l: "...I will stay in bed all day.", r: "...we will have a football match.", ans: 'r' },
            { q: "If the lake freezes over...", l: "...we will go ice skating.", r: "...we'll go for a swim.", ans: 'l' },
            { q: "If it's too hot outside...", l: "...we'll run a marathon.", r: "...we'll exercise in the gym.", ans: 'r' },
            { q: "If I find my racket...", l: "...I'll play tennis with you.", r: "...I'll play soccer instead.", ans: 'l' },
            { q: "If the snow is deep...", l: "...we will go skiing.", r: "...we'll ride our bicycles.", ans: 'l' },
            { q: "If the waves are calm...", l: "...it will be bad for surfing.", r: "...we will win the surf contest.", ans: 'l' },
            { q: "If our team wins today...", l: "...we will go to the finals.", r: "...we'll stop playing forever.", ans: 'l' },
            { q: "If it is foggy tomorrow...", l: "...the race will start early.", r: "...the race will be delayed.", ans: 'r' }
        ];

        let currentQ = 0;
        let score = 0;
        let faceLandmarker;
        let webcamRunning = false;
        let timer;
        let timeLeft = 7;
        let canAnswer = true;

        const video = document.getElementById("webcam");
        const startBtn = document.getElementById("start-btn");
        const overlay = document.getElementById("overlay");
        const gameContainer = document.getElementById("game-container");

        // Initialize Face Mesh
        async function setupFaceTracking() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
                outputFaceBlendshapes: true,
                runningMode: "VIDEO",
                numFaces: 1
            });
        }

        // Start Camera
        startBtn.addEventListener("click", async () => {
            startBtn.disabled = true;
            startBtn.innerText = "Loading AI...";
            await setupFaceTracking();
            
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    overlay.classList.add("hidden");
                    gameContainer.classList.remove("hidden");
                    startGame();
                });
            });
        });

        function startGame() {
            showQuestion();
            predictWebcam();
        }

        function showQuestion() {
            if (currentQ >= questions.length) {
                finishGame();
                return;
            }

            canAnswer = true;
            timeLeft = 7;
            document.getElementById("question-text").innerText = questions[currentQ].q;
            document.getElementById("option-left").querySelector('.text').innerText = questions[currentQ].l;
            document.getElementById("option-right").querySelector('.text').innerText = questions[currentQ].r;
            
            document.getElementById("option-left").classList.remove("selected");
            document.getElementById("option-right").classList.remove("selected");

            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            updateTimerUI();
            timer = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    handleAnswer(null); // Time out
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById("timer-text").innerText = `Time: ${timeLeft}s`;
            document.getElementById("timer-fill").style.width = (timeLeft / 7 * 100) + "%";
        }

        async function predictWebcam() {
            if (faceLandmarker && video.currentTime !== -1) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.faceLandmarks && results.faceLandmarks.length > 0 && canAnswer) {
                    const landmarks = results.faceLandmarks[0];
                    // Logic: Get nose (index 1) and compare X relative to forehead (index 10) 
                    // or use the roll calculation from eyes. 
                    // Simpler: Check X position of nose vs chin alignment
                    const nose = landmarks[1];
                    const forehead = landmarks[10];
                    const tilt = (nose.x - forehead.x) * 100;

                    // Threshold: Ignore small movements (-1.5 to 1.5)
                    // Since video is scaleX(-1), moving head to physical right makes nose.x smaller than forehead.x
                    if (tilt < -2) { 
                        handleAnswer('r'); 
                    } else if (tilt > 2) { 
                        handleAnswer('l'); 
                    }
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function handleAnswer(choice) {
            if (!canAnswer) return;
            canAnswer = false;
            clearInterval(timer);

            const correct = questions[currentQ].ans;
            
            if (choice === 'l') document.getElementById("option-left").classList.add("selected");
            if (choice === 'r') document.getElementById("option-right").classList.add("selected");

            if (choice === correct) {
                score += 10;
                document.getElementById("snd-correct").play();
            } else {
                document.getElementById("snd-wrong").play();
            }

            document.getElementById("score").innerText = `Score: ${score}`;

            setTimeout(() => {
                currentQ++;
                showQuestion();
            }, 1500);
        }

        function finishGame() {
            overlay.innerHTML = `<h1>Game Finished!</h1><p>Your Final Score: ${score}/100</p><button onclick="location.reload()">Play Again</button>`;
            overlay.classList.remove("hidden");
            gameContainer.classList.add("hidden");
        }
    <script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0";

    // ... (Keep the questions array same as before) ...

    startBtn.addEventListener("click", async () => {
        try {
            startBtn.disabled = true;
            startBtn.innerText = "Loading AI...";

            // 1. Setup Tracking
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, 
                    delegate: "GPU" 
                },
                outputFaceBlendshapes: false,
                runningMode: "VIDEO",
                numFaces: 1
            });

            // 2. Request Camera
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480 } 
            });
            
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                overlay.classList.add("hidden");
                gameContainer.classList.remove("hidden");
                startGame();
            };

        } catch (error) {
            console.error(error);
            alert("Error: " + error.message + "\n\nMake sure you are using a Local Server (like Live Server) and have allowed Camera access.");
            startBtn.disabled = false;
            startBtn.innerText = "Start Game";
        }
    });
    
    // ... (Keep rest of the game logic functions) ...
</script>
</body>
</html>
