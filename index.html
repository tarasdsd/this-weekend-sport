<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>If Conditional Sports Tilt</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --soft-blue: #e3f2fd; --deep-blue: #1976d2; --correct: #4caf50; --wrong: #f44336; }
        body { font-family: 'Outfit', sans-serif; background: var(--soft-blue); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { width: 90%; max-width: 800px; text-align: center; }
        #video-wrap { position: relative; width: 320px; height: 240px; margin: 0 auto 20px; border: 4px solid white; border-radius: 15px; overflow: hidden; transform: scaleX(-1); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .options { display: flex; gap: 20px; margin-top: 20px; }
        .box { flex: 1; background: white; padding: 25px; border-radius: 15px; font-weight: bold; border: 5px solid transparent; transition: 0.2s; }
        .selected { border-color: var(--correct); background: #f0fff0; transform: scale(1.05); }
        #q-text { font-size: 1.8rem; margin-bottom: 20px; min-height: 3rem; }
        #start-overlay { position: fixed; inset: 0; background: var(--soft-blue); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button { padding: 15px 40px; font-size: 1.2rem; background: var(--deep-blue); color: white; border: none; border-radius: 30px; cursor: pointer; }
        #score-board { position: absolute; top: 20px; font-size: 1.5rem; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="score-board">Score: 0 | Time: 7s</div>

    <div id="start-overlay">
        <h1>If Conditional Sports Game</h1>
        <p>Tilt your head to choose the answer!</p>
        <button id="start-btn">Allow Camera & Start</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="video-wrap"><video id="webcam" autoplay playsinline></video></div>
        <div id="q-text">Loading...</div>
        <div class="options">
            <div id="opt-l" class="box">⬅ <div class="txt">Option A</div></div>
            <div id="opt-r" class="box">➡ <div class="txt">Option B</div></div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "If it rains tomorrow...", l: "...we'll play indoors.", r: "...we'll go surfing.", a: "l" },
            { q: "If the wind is strong...", l: "...we'll fly a kite.", r: "...we won't go sailing.", a: "r" },
            { q: "If it's sunny Saturday...", l: "...I'll sleep all day.", r: "...we'll play football.", a: "r" },
            { q: "If the lake freezes...", l: "...we'll go ice skating.", r: "...we'll swim.", a: "l" },
            { q: "If it's too hot...", l: "...we'll run a race.", r: "...we'll use the gym.", a: "r" },
            { q: "If I find my racket...", l: "...I'll play tennis.", r: "...I'll play soccer.", a: "l" },
            { q: "If the snow is deep...", l: "...we'll go skiing.", r: "...we'll bike.", a: "l" },
            { q: "If waves are calm...", l: "...surfing is bad.", r: "...we'll win surf-pro.", a: "l" },
            { q: "If we win today...", l: "...we go to finals.", r: "...we quit sports.", a: "l" },
            { q: "If it's foggy...", l: "...we start early.", r: "...we'll delay the race.", a: "r" }
        ];

        let model, video, currentQ = 0, score = 0, canReady = true, timer;

        async function init() {
            document.getElementById('start-btn').innerText = "Loading AI...";
            model = await blazeface.load();
            video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            nextQuestion();
            detect();
        }

        async function detect() {
            const predictions = await model.estimateFaces(video, false);
            if (predictions.length > 0 && canReady) {
                const landmarks = predictions[0].landmarks;
                const nose = landmarks[2]; // Nose point
                const rightEye = landmarks[0]; // Right Eye
                const leftEye = landmarks[1]; // Left Eye
                
                // Tilt logic: Compare nose X position to midpoint of eyes
                const eyeMid = (rightEye[0] + leftEye[0]) / 2;
                const tilt = nose[0] - eyeMid;

                if (tilt > 12) answer('r'); // Adjusted for mirrored view logic
                else if (tilt < -12) answer('l');
            }
            requestAnimationFrame(detect);
        }

        function answer(choice) {
            canReady = false;
            clearInterval(timer);
            const correct = questions[currentQ].a;
            document.getElementById(choice === 'l' ? 'opt-l' : 'opt-r').classList.add('selected');
            
            if(choice === correct) score += 10;
            document.getElementById('score-board').innerText = `Score: ${score} | Time: --`;

            setTimeout(() => {
                currentQ++;
                if(currentQ < questions.length) nextQuestion();
                else alert("Game Finished! Score: " + score);
            }, 1500);
        }

        function nextQuestion() {
            canReady = true;
            let time = 7;
            document.getElementById('opt-l').classList.remove('selected');
            document.getElementById('opt-r').classList.remove('selected');
            document.getElementById('q-text').innerText = questions[currentQ].q;
            document.getElementById('opt-l').querySelector('.txt').innerText = questions[currentQ].l;
            document.getElementById('opt-r').querySelector('.txt').innerText = questions[currentQ].r;
            
            timer = setInterval(() => {
                time--;
                document.getElementById('score-board').innerText = `Score: ${score} | Time: ${time}s`;
                if(time <= 0) { clearInterval(timer); answer('none'); }
            }, 1000);
        }

        document.getElementById('start-btn').onclick = init;
    </script>
</body>
</html>
